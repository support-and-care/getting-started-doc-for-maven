name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install zensical

      - name: Set site_url for GitHub Pages
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          python3 <<'PY'
          import os, re
          url = os.environ["SITE_URL"].rstrip("/") + "/"
          path = "zensical.toml"
          text = open(path, encoding="utf-8").read()
          if re.search(r"^site_url\s*=", text, re.M):
              text = re.sub(r"^site_url\s*=.*$", "site_url = " + repr(url), text, count=1, flags=re.M)
          else:
              text = text.replace("[project]\n", "[project]\nsite_url = " + repr(url) + "\n", 1)
          open(path, "w", encoding="utf-8").write(text)
          PY

      - name: Build site
        run: zensical build --clean -f zensical.toml

      - name: Deploy to gh-pages (production)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          enable_jekyll: false
          # Keep existing pr/<n>/ preview folders when updating the root site.
          keep_files: true

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install zensical

      - name: Set site_url for PR preview
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${{ github.event.pull_request.number }}/
        run: |
          python3 <<'PY'
          import os, re
          url = os.environ["SITE_URL"].rstrip("/") + "/"
          path = "zensical.toml"
          text = open(path, encoding="utf-8").read()
          if re.search(r"^site_url\s*=", text, re.M):
              text = re.sub(r"^site_url\s*=.*$", "site_url = " + repr(url), text, count=1, flags=re.M)
          else:
              text = text.replace("[project]\n", "[project]\nsite_url = " + repr(url) + "\n", 1)
          open(path, "w", encoding="utf-8").write(text)
          PY

      - name: Build site
        run: zensical build --clean -f zensical.toml

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: pr/${{ github.event.pull_request.number }}
          enable_jekyll: false
          keep_files: true

      - name: Comment PR with preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const n = context.issue.number;
            const url = `https://${owner}.github.io/${repo}/pr/${n}/`;
            github.rest.issues.createComment({
              issue_number: n,
              owner,
              repo,
              body: `Docs preview for this PR: ${url}`,
            });
